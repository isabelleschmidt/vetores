<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ex 08</title>
</head>
<body>
    <h1>Alunos</h1><br>
    Aluno: <input type="text" id="ipt_aluno">
    <button onclick="cadastrar()">Cadastrar</button><br>
    <div id="div_msg"></div>
</body>
</html>
<script>
    let vtAlunos = [];
    function cadastrar(){
        vtAlunos.push(ipt_aluno.value);
        ipt_aluno.value = "";
        mostrar();
    }
    function mostrar(){
        div_msg.innerHTML = "";
        for (let i = vtAlunos.length - 1; i >= 0; i--) {
            div_msg.innerHTML += `${vtAlunos[i]}<br>`;
        }
    }
</script>
